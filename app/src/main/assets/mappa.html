<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html, #map { height: 100%; margin: 0; padding: 0; }
    </style>
</head>
<body>
<div id="map"></div>

<!-- Dentro script mettiamo tutto il codice riguardante il JS -->
<script>
    // Inizializza la mappa in base alle coordinate che mettiamo
    var map = L.map('map').setView([45.855722, 9.569083], 11);      // Coordinate e quanto deve essere zoomato

    // Non ho ancora capito a cosa servono, ma sono FONDAMENTALI
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // Aggiungiamo i nostri marker
    var MarkerOlmo = L.marker([45.969806,9.648611]).addTo(map);
    var MarkerBrembilla = L.marker([45.820694,9.596528]).addTo(map);
    var MarkerValsecca = L.marker([45.826389,9.496667]).addTo(map);
    var MarkerAlme = L.marker([45.740111,9.612139]).addTo(map);


    // Quando l'utente clicca sul marker, chiamiamo Kotlin passando i dati
    MarkerOlmo.on('click', function() {
        if (window.Android) {
            // Passiamo il nome della activity
            window.Android.onMarkerClick("Olmo");
        }
    MarkerBrembilla.on('click', function() {
        if (window.Android) {
            window.Android.onMarkerClick("Brembilla");
        }
    });
    MarkerValsecca.on('click', function() {
        if (window.Android) {
            window.Android.onMarkerClick("Valsecca");
        }
    });
    MarkerAlme.on('click', function() {
        if (window.Android) {
            window.Android.onMarkerClick("Alme");
        }
    });
    });
</script>
</body>
</html>
