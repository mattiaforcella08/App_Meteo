<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html, #map { height: 100%; margin: 0; padding: 0; }
    </style>
</head>
<body>
<div id="map"></div>

<!-- Dentro script mettiamo tutto il codice riguardante il JS -->
<script>
    // Inizializza la mappa in base alle coordinate che mettiamo
    var map = L.map('map').setView([45.808667, 9.599889], 15);      // Coordinate e quanto deve essere zoomato

    // Non ho ancora capito a cosa servono, ma sono FONDAMENTALI
    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // Aggiungiamo i nostri marker
    var marker1 = L.marker([45.969806,9.648611]).addTo(map);

    // Quando l'utente clicca sul marker, chiamiamo Kotlin passando i dati
    marker1.on('click', function() {
        if (window.Android) {
            // Passiamo il nome della activity
            window.Android.onMarkerClick("prova");
        }
    });
</script>
</body>
</html>
